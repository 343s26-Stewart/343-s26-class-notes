<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>CS 343 Prep 5</title>
  <link rel="icon" href="https://fav.mhciael.com/🎨">
  <link rel="stylesheet" href="styles/default.css">
  <script src="scripts/main.js"></script>
</head>

<body>
  <h1>Prep 5 Styling, Events and Functions </h1>

  <main>
    <h2>Color Picker</h2>
    <p>Click a tile...</p>
    <div class="block" style="background-color:white">1</div>
    <div class="block" style="background-color:hotpink">0</div>
    <div class="block" style="background-color:red">0</div>
    <div class="block" style="background-color:orange">0</div>
    <div class="block" style="background-color:yellow">0</div>
    <div class="block" style="background-color:green">0</div>
    <div class="block" style="background-color:blue">0</div>
    <div class="block" style="background-color:var(--jmu-purple)">0</div>
    <div class="block" style="background-color:var(--jmu-slate-gray)">0</div>
    <div class="block" style="background-color:var(--jmu-cs-teal)">0</div>
    <div class="block" style="background-color:var(--jmu-cs-ice-blue)">0</div>
    <div class="block" style="background-color:var(--jmu-light-gold)">0</div>
    <p>Or <button type="button" id="custom-color">choose a custom color</button></p>
    <dl>
      <dt>else count</dt>
      <dd><code id="else-count">0</code></dd>
    </dl>
  </main>

  <h2>Color Lister</h2>
  <ol id="color-history" reversed>
    <li>
      <div class="block" style="background-color:white">white</div>
    </li>
  </ol>
</body>

</html>
