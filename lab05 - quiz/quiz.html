<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Amazing Trivia Game</title>
    <link rel="icon" href="https://fav.mhciael.com/🎯">
    <link rel="stylesheet" href="styles/jmu-cs-343.css">
    <link rel="stylesheet" href="styles/quiz.css">
    <script src="scripts/questions.js"></script>
</head>

<body class="jmu">
    <h1>The Amazing Trivia Game</h1>
    <div id="win-message" hidden>
        <h2>Your did it!</h2>
        <p>Final correctness: <span>0%</span></p>
    </div>
    <div id="quiz-container">
        <div id="question"></div>
        <div id="answers">
            <button data-answer-choice="A" id="btnA" type="button" aria-label="Answer A"></button>
            <button data-answer-choice="B" id="btnB" type="button" aria-label="Answer B"></button>
            <button data-answer-choice="C" id="btnC" type="button" aria-label="Answer C"></button>
            <button data-answer-choice="D" id="btnD" type="button" aria-label="Answer D"></button>
        </div>
        <div class="count">
            <span class="correctness">Right: <span class="correct">0</span></span>
            <span class="correctness">Wrong: <span class="incorrect">0</span></span>
        </div>
    </div>
    <script src="scripts/quiz.js"></script>
</body>

</html>
